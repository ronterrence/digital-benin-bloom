<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Full West African ceramic heritage map</title>
<desc>Four parallel streams of ceramic heritage: Nok-Ife-Benin forest belt; Igbo-Ukwu independent; Sao-Kanem-Borno Chad Basin; Hausa Saharan-influenced. All sharing pan-African roots.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
rect.box { fill:#F1EFE8; stroke:#888780; }
rect.amber { fill:#FAEEDA; stroke:#854F0B; }
rect.teal { fill:#E1F5EE; stroke:#0F6E56; }
rect.purple { fill:#EEEDFE; stroke:#534AB7; }
rect.coral { fill:#FAECE7; stroke:#993C1D; }
rect.blue { fill:#E6F1FB; stroke:#185FA5; }
rect.gray { fill:#F1EFE8; stroke:#5F5E5A; }
text.th { font-family: sans-serif; font-size:13px; font-weight:600; fill:#2C2C2A; }
text.ts { font-family: sans-serif; font-size:11px; fill:#5F5E5A; }
text.amber { fill:#633806; }
text.teal { fill:#085041; }
text.purple { fill:#3C3489; }
text.coral { fill:#712B13; }
text.blue { fill:#0C447C; }
</style>
</defs>

<rect class="gray" x="190" y="20" width="300" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="38" text-anchor="middle">Pan-African ceramic root</text>
<text class="ts" x="340" y="54" text-anchor="middle">Ounjougou c.9400 BCE / Nubia c.8000 BCE</text>

<line x1="260" y1="64" x2="148" y2="124" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="310" y1="64" x2="265" y2="124" stroke="#888780" stroke-width="1" marker-end="url(#arrow)" fill="none"/>
<line x1="370" y1="64" x2="420" y2="124" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<line x1="430" y1="64" x2="555" y2="124" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>

<rect class="amber" x="40" y="124" width="190" height="56" rx="8" stroke-width="0.5"/>
<text class="th amber" x="135" y="145" text-anchor="middle">Nok culture</text>
<text class="ts" x="135" y="163" text-anchor="middle">1500 BCE–200 CE, Jos Plateau</text>

<rect class="teal" x="240" y="124" width="190" height="56" rx="8" stroke-width="0.5"/>
<text class="th teal" x="335" y="145" text-anchor="middle">Igbo-Ukwu / Nri</text>
<text class="ts" x="335" y="163" text-anchor="middle">9th–12th c. CE, independent</text>

<rect class="purple" x="440" y="124" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th purple" x="540" y="145" text-anchor="middle">Sao civilisation</text>
<text class="ts" x="540" y="163" text-anchor="middle">6th c. BCE–16th c. CE, Chad Basin</text>

<line x1="135" y1="180" x2="135" y2="250" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect class="amber" x="40" y="250" width="190" height="56" rx="8" stroke-width="0.5"/>
<text class="th amber" x="135" y="271" text-anchor="middle">Ife (Yoruba)</text>
<text class="ts" x="135" y="289" text-anchor="middle">12th–15th c. CE</text>

<line x1="335" y1="180" x2="277" y2="250" stroke="#888780" stroke-width="0.7" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="295" y="222" text-anchor="middle">glass bead link</text>

<line x1="540" y1="180" x2="540" y2="250" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect class="purple" x="440" y="250" width="200" height="56" rx="8" stroke-width="0.5"/>
<text class="th purple" x="540" y="271" text-anchor="middle">Kanem-Borno Empire</text>
<text class="ts" x="540" y="289" text-anchor="middle">8th–19th c. CE, Lake Chad</text>

<rect x="446" y="196" width="108" height="28" rx="4" fill="none" stroke="#534AB7" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="ts purple" x="500" y="208" text-anchor="middle">N.Africa glazed</text>
<text class="ts purple" x="500" y="220" text-anchor="middle">pottery import</text>
<line x1="500" y1="224" x2="515" y2="248" stroke="#534AB7" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)" fill="none"/>

<line x1="135" y1="306" x2="135" y2="376" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)" fill="none"/>

<rect class="coral" x="40" y="376" width="190" height="56" rx="8" stroke-width="0.5"/>
<text class="th coral" x="135" y="397" text-anchor="middle">Kingdom of Benin</text>
<text class="ts" x="135" y="415" text-anchor="middle">13th–19th c. CE</text>

<line x1="430" y1="278" x2="365" y2="376" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="395" y="330" text-anchor="middle">savanna trade</text>

<rect class="blue" x="240" y="376" width="190" height="56" rx="8" stroke-width="0.5"/>
<text class="th blue" x="335" y="397" text-anchor="middle">Hausa city-states</text>
<text class="ts" x="335" y="415" text-anchor="middle">Kano, Zaria, Sokoto / Sanka ware</text>

<line x1="540" y1="306" x2="432" y2="376" stroke="#534AB7" stroke-width="0.9" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text class="ts purple" x="504" y="348" text-anchor="middle">Kanuri influence</text>

<rect x="444" y="336" width="196" height="36" rx="6" fill="none" stroke="#185FA5" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="ts blue" x="542" y="353" text-anchor="middle">Trans-Saharan Islamic</text>
<text class="ts blue" x="542" y="365" text-anchor="middle">ceramic influence</text>
<line x1="540" y1="372" x2="480" y2="374" stroke="#185FA5" stroke-width="0.7" stroke-dasharray="3 2" marker-end="url(#arrow)" fill="none"/>

<rect x="240" y="464" width="400" height="72" rx="8" fill="none" stroke="#888780" stroke-dasharray="5 4" stroke-width="0.5"/>
<text class="th" x="440" y="484" text-anchor="middle">Shared regional exchange zone</text>
<text class="ts" x="440" y="502" text-anchor="middle">Kola nuts, leather, pottery southward</text>
<text class="ts" x="440" y="518" text-anchor="middle">Salt, glass beads, Saharan goods northward</text>

<line x1="335" y1="432" x2="340" y2="462" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>
<line x1="540" y1="432" x2="540" y2="462" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>
<line x1="135" y1="432" x2="258" y2="470" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3" marker-end="url(#arrow)" fill="none"/>

<rect x="40" y="464" width="185" height="72" rx="8" fill="none" stroke="#C4A882" stroke-dasharray="4 3" stroke-width="0.5"/>
<text class="th" x="133" y="484" text-anchor="middle">Nile Valley traditions</text>
<text class="ts" x="133" y="502" text-anchor="middle">Nubia / Egypt (parallel)</text>
<text class="ts" x="133" y="518" text-anchor="middle">Shared roots — no direct lineage</text>

<rect x="40" y="590" width="16" height="10" rx="2" fill="#BA7517"/>
<text class="ts" x="62" y="598" dominant-baseline="central">confirmed artistic lineage</text>
<line x1="228" y1="598" x2="258" y2="598" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
<text class="ts purple" x="266" y="598" dominant-baseline="central">Islamic/Saharan influence</text>
<line x1="418" y1="598" x2="448" y2="598" stroke="#888780" stroke-dasharray="4 3" stroke-width="0.7" marker-end="url(#arrow)" fill="none"/>
<text class="ts" x="456" y="598" dominant-baseline="central">trade / possible link</text>

</svg>
